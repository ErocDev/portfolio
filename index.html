<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Portfolio</title>
    <link rel="stylesheet" href="/src/style.css" />
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:ital,wght@1,700&display=swap" rel="stylesheet">
  </head>
  <body>
    <div id="app">
      <!-- Hero / Landing Section-->
      <section id="hero">
        <div id="hero-bg"></div>
        <div class="geo geo-1"></div>
        <div class="geo geo-2"></div>
        <div class="geo geo-3"></div>
        <nav id="menu">
          <ul>
            <li>About</li>
            <li>Projects</li>
            <li>Skills</li>
            <li>Contact</li>
          </ul>
        </nav>
        <div id="character">
          <img src="/src/assets/yu.png" alt="" />
        </div>
        <div id="hero-text">
          <span id="handle">ErocDev</span>
          <h1 id="name">Eric T.</h1>
          <p id="tagline">Computer Science Student & Developer</p>
        </div>
        <div id="controls">
          <span><span class="key">W</span> / <span class="key">S</span> Navigate</span>
          <span><span class="key">↵</span> Select</span>
        </div>
      </section>

      <!--About-->
      <section id="about"></section>

      <!--Projects-->
      <section id="projects"></section>

      <!--Skills-->
      <section id="skills"></section>

      <!--Contact-->
      <section id="contact"></section>

    </div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
